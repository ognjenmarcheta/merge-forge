name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # git identity for the fixture-repo tests
      - run: git config --global user.email ci@merge-forge && git config --global user.name CI
      - run: pnpm run check
      - run: pnpm run package
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'
